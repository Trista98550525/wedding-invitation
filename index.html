<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>楼丹宁 ❤️ 陈抒钊 · 婚礼邀请</title>
<style>
:root {
  --sage: #7a9e7e;
  --sage-light: #a8c5ab;
  --sage-dark: #5a7a5e;
  --lavender: #9b8fb8;
  --lavender-light: #c4b8d9;
  --lavender-dark: #7a6a98;
  --rose: #c48b9f;
  --rose-light: #e8b8c4;
  --text: #4a4a4a;
  --text-light: #7a7a7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: #faf8f5;
  overflow-x: hidden;
  -webkit-overflow-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* 花瓣画布 */
.petal-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 开场叠加层 */
.opening-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 90;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #f0e8f8 0%, #e8ddf5 30%, #dfd4ef 60%, #ece4f5 100%);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* 叠加层装饰图案 - 淡紫色圆点 */
.opening-overlay::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 15% 20%, rgba(180, 150, 210, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 85% 80%, rgba(200, 170, 220, 0.12) 0%, transparent 35%),
    radial-gradient(circle at 75% 15%, rgba(160, 130, 190, 0.1) 0%, transparent 30%),
    radial-gradient(circle at 25% 85%, rgba(185, 155, 205, 0.12) 0%, transparent 38%);
  pointer-events: none;
}

.opening-overlay.animate-in {
  animation: overlayFadeIn 1.2s ease forwards;
}

@keyframes overlayFadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.opening-text-group {
  text-align: center;
  animation: fadeInUp 2s ease 0.5s forwards;
  opacity: 0;
  margin-bottom: 24px;
}

.opening-name {
  width: min(250px, 75vw);
  margin-bottom: 16px;
  opacity: 0.85;
}

.opening-date-line {
  width: 40px;
  height: 1px;
  background: rgba(155,143,184,0.4);
  margin: 0 auto 20px;
}

.opening-date-cn {
  display: block;
  font-size: 11px;
  letter-spacing: 3.5px;
  color: rgba(130, 100, 160, 0.85);
  margin-bottom: 16px;
}

.opening-handwriting {
  width: min(180px, 55vw);
  margin-bottom: 16px;
  opacity: 0.85;
}

.opening-elements {
  width: min(250px, 75vw);
  margin-bottom: 24px;
  opacity: 0.9;
}

.opening-hint {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(130, 100, 160, 0.8);
  animation: fadeInUp 1.6s ease 1.8s forwards, hintPulse 3s ease-in-out 3.5s infinite;
  opacity: 0;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes hintPulse {
  0%, 100% { opacity: 0.4; }
  50%      { opacity: 0.85; }
}

/* 插画背景 */
.illustration-bg {
  display: block;
  width: 100%;
  max-width: 100vw;
  opacity: 0;
  filter: blur(6px) brightness(0.9);
  transition: opacity 2.8s ease, filter 2.8s ease;
  pointer-events: none;
}

.illustration-bg.revealed {
  opacity: 1;
  filter: blur(0) brightness(1);
}

/* 图片加载中占位背景 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(145deg, #f0e8f8 0%, #e4d8f0 50%, #ece4f5 100%);
  z-index: 1;
  pointer-events: none;
}

/* 主滚动容器 - 揭晓后恢复文档流 */
.main-container {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10;
  overflow-y: auto;
}

.main-container.scrolling {
  position: relative;
  top: auto; left: auto; right: auto; bottom: auto;
}

/* 卡片包装器 - 相对背景图定位 */
.card-wrapper {
  position: relative;
  min-height: 100vh;
}

/* 文字卡片 - 固定在容器底部 */
.content-card {
  position: absolute;
  bottom: 230px;
  left: 0; right: 0;
  background: rgba(255,255,255,0.45);
  border-radius: 20px;
  padding: 32px 6vw;
  box-shadow: 0 -20px 60px rgba(90,120,90,0.25), 0 8px 32px rgba(0,0,0,0.15);
  max-width: min(340px, 88vw);
  margin: 0 auto;
  opacity: 0;
  visibility: hidden;
  transform: translateY(40px);
  transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.3s ease;
}

.content-card.visible {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

/* 返回按钮 */
.back-to-top-wrap {
  position: fixed;
  bottom: max(20px, env(safe-area-inset-bottom, 20px));
  left: 50%;
  transform: translateX(-50%) translateY(15px);
  z-index: 50;
  opacity: 0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  pointer-events: none;
}

.back-to-top-wrap.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}

.back-to-top-text {
  display: inline-block;
  font-size: 13px;
  color: var(--lavender-dark);
  padding: 9px 24px;
  letter-spacing: 2px;
  background: rgba(255,255,255,0.75);
  border-radius: 20px;
  border: 1px solid rgba(155,143,184,0.4);
  backdrop-filter: blur(3px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* 邀请语 */
.invitation-text { text-align: center; padding: 0 0 6px; }

.salutation {
  display: block;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--lavender);
  margin-top: -4px;
  margin-bottom: 6px;
}

.invite-copy {
  display: block;
  font-size: clamp(15px, 4.5vw, 16px);
  line-height: 1.9;
  color: var(--text);
  white-space: pre-line;
}

/* 分隔装饰 */
.section-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 10px 0;
}

.div-line {
  flex: 1;
  max-width: 60px;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--sage-light), transparent);
}

.div-ornament { font-size: 16px; opacity: 0.6; }

/* 日期时间 */
.datetime-block {
  text-align: center;
  padding: 10px 12px;
  margin: 4px 0 6px;
  border-top: 1px dashed rgba(122,158,126,0.3);
  border-bottom: 1px dashed rgba(122,158,126,0.3);
}

.date-main {
  display: block;
  font-size: clamp(22px, 6.5vw, 26px);
  color: var(--sage-dark);
  font-weight: 400;
  letter-spacing: 4px;
  margin-bottom: 2px;
}

.date-detail {
  display: block;
  font-size: clamp(13px, 3.5vw, 14px);
  color: var(--text-light);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.time-highlight {
  display: inline-block;
  padding: 6px 18px;
  background: linear-gradient(135deg, var(--rose-light), var(--rose));
  color: white;
  border-radius: 20px;
  font-size: clamp(14px, 4vw, 16px);
  letter-spacing: 2px;
}

/* 地点 */
.venue-block { text-align: center; padding: 8px 8px 10px; margin-bottom: 8px; }

.venue-label {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--lavender);
  margin-bottom: 8px;
}

.venue-address {
  display: block;
  font-size: clamp(13px, 3.8vw, 14px);
  color: var(--text-light);
  line-height: 1.9;
}

.venue-name {
  display: block;
  font-size: clamp(15px, 4.5vw, 18px);
  color: var(--sage-dark);
  font-weight: 500;
  margin-bottom: 4px;
  letter-spacing: 2px;
}

.venue-subaddress {
  display: block;
  font-size: clamp(12px, 3.5vw, 13px);
  color: var(--text-light);
  line-height: 1.9;
  margin-bottom: 12px;
}

.map-btn {
  margin-top: 12px;
  padding: 10px 20px;
  font-size: 13px;
  background: rgba(255,255,255,0.8);
  border: 1px solid var(--lavender-light);
  border-radius: 20px;
  color: var(--lavender);
  line-height: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  font-family: inherit;
}

/* 倒计时 */
.countdown-section { text-align: center; padding: 8px 8px 10px; }

/* 相册链接 */
.gallery-link-wrap { text-align: center; padding: 4px 0 8px; }

.gallery-link {
  display: inline-block;
  font-size: 13px;
  letter-spacing: 2px;
  color: var(--lavender-dark);
  text-decoration: none;
  padding: 10px 24px;
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--lavender-light);
  border-radius: 24px;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}

.gallery-link:active {
  background: rgba(196,184,217,0.3);
  transform: scale(0.97);
}

.cd-title {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--lavender);
  margin-bottom: 8px;
}

.countdown {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.cd-unit { text-align: center; min-width: 44px; }

.cd-num {
  display: block;
  font-size: clamp(26px, 8vw, 32px);
  font-weight: 300;
  color: var(--sage-dark);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.cd-text {
  display: block;
  font-size: clamp(8px, 2.5vw, 9px);
  letter-spacing: 1px;
  color: var(--lavender);
  margin-top: 4px;
}

.cd-sep {
  font-size: clamp(20px, 6vw, 24px);
  color: var(--rose-light);
  line-height: 1;
  padding-top: 2px;
}

/* 音乐按钮 */
.music-btn {
  position: fixed;
  top: max(20px, env(safe-area-inset-top, 20px));
  right: max(20px, env(safe-area-inset-right, 20px));
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 80;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: none;
  outline: none;
  font-family: inherit;
}

.music-icon-text { font-size: 20px; color: var(--sage-dark); }

.music-bars {
  display: none;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  height: 16px;
}

.music-bars div {
  width: 3px;
  background: var(--sage-dark);
  border-radius: 2px;
  animation: musicBar 0.8s ease-in-out infinite;
}

.music-bars div:nth-child(1) { height: 40%; animation-delay: 0s; }
.music-bars div:nth-child(2) { height: 70%; animation-delay: 0.2s; }
.music-bars div:nth-child(3) { height: 50%; animation-delay: 0.4s; }
.music-bars div:nth-child(4) { height: 80%; animation-delay: 0.6s; }

.music-btn.playing .music-icon-text { display: none; }
.music-btn.playing .music-bars { display: flex; }

@keyframes musicBar {
  0%, 100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.5); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: max(80px, env(safe-area-inset-bottom, 80px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(90,122,94,0.92);
  color: white;
  padding: 12px 24px;
  border-radius: 26px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.scroll-hint {
  position: fixed;
  bottom: max(40px, env(safe-area-inset-bottom, 40px));
  left: 50%;
  transform: translateX(-50%) translateY(15px);
  z-index: 80;
  opacity: 0;
  transition: opacity 0.8s ease, transform 0.8s ease;
  pointer-events: none;
}

.scroll-hint-text {
  font-size: 11px;
  letter-spacing: 2px;
  color: rgba(155,143,184,0.7);
  padding: 8px 20px;
  background: rgba(255,255,255,0.6);
  border-radius: 20px;
  border: 1px solid rgba(155,143,184,0.3);
  backdrop-filter: blur(3px);
  white-space: nowrap;
}

/* ====== 相册弹窗 ====== */
.gallery-modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 9999;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.gallery-modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}

.gallery-modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 10000;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

.gallery-modal.open {
  opacity: 1;
  pointer-events: auto;
}

.gallery-modal-header {
  flex-shrink: 0;
  padding: max(16px, env(safe-area-inset-top, 16px)) max(20px, env(safe-area-inset-right, 20px)) 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: linear-gradient(to bottom, rgba(250,248,245,0.98) 60%, transparent);
}

.gallery-modal-close {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.3);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.gallery-modal-title {
  text-align: center;
  flex: 1;
}

.gallery-modal-title span {
  display: block;
  font-size: 10px;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 2px;
}

.gallery-modal-title strong {
  display: block;
  font-size: 16px;
  letter-spacing: 3px;
  color: white;
  font-weight: 400;
}

.gallery-modal-placeholder {
  width: 40px;
}

.gallery-modal-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 12px 40px;
}

.gallery-modal-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  max-width: 480px;
  margin: 0 auto;
}

.gallery-modal-item {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(200,190,210,0.2);
}

.gallery-modal-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.gallery-modal-item:active img {
  transform: scale(0.96);
}

.gallery-modal-item.video-item {
  background: linear-gradient(145deg, #e8ddf5 0%, #d4c4e8 40%, #f0e4f5 100%);
}

.gallery-modal-item.video-item::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(196,139,159,0.3) 0%, rgba(155,143,184,0.25) 100%);
  pointer-events: none;
}

.gallery-modal-item.video-item::after {
  content: '▶';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 44px;
  height: 44px;
  background: rgba(0,0,0,0.45);
  border-radius: 50%;
  color: white;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  backdrop-filter: blur(2px);
}

/* 全屏图片查看器 */
.gallery-lightbox {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.95);
  z-index: 10001;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.gallery-lightbox.open {
  opacity: 1;
  pointer-events: auto;
}

.gallery-lightbox-img-wrap {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.gallery-lightbox-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.gallery-lightbox-img.loaded {
  opacity: 1;
}

.gallery-lightbox-video {
  max-width: 100%;
  max-height: 100%;
  border-radius: 4px;
}

.gallery-lightbox-video-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  background: rgba(0,0,0,0.5);
  border-radius: 50%;
  color: white;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 2;
}

.gallery-lightbox-close {
  position: fixed;
  top: max(16px, env(safe-area-inset-top, 16px));
  right: max(20px, env(safe-area-inset-right, 20px));
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10002;
  -webkit-tap-highlight-color: transparent;
}

.gallery-lightbox-prev,
.gallery-lightbox-next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10002;
  -webkit-tap-highlight-color: transparent;
}

.gallery-lightbox-prev { left: max(12px, env(safe-area-inset-left, 12px)); }
.gallery-lightbox-next { right: max(12px, env(safe-area-inset-right, 12px)); }

.gallery-lightbox-counter {
  position: fixed;
  bottom: max(30px, env(safe-area-inset-bottom, 30px));
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  letter-spacing: 2px;
  z-index: 10002;
}
</style>
</head>
<body>

<canvas class="petal-canvas" id="petalCanvas"></canvas>

<!-- 持久音频播放器 iframe -->
<iframe id="audioFrame" src="audio-player.html" style="display:none" sandbox="allow-scripts allow-same-origin"></iframe>

<div class="opening-overlay animate-in" id="openingOverlay">
  <div class="opening-text-group">
    <img class="opening-name" src="images/name1_deep.png" alt="新人姓名">
    <div class="opening-date-line"></div>
    <span class="opening-date-cn">贰零贰陆 · 伍月 · 拾陆</span>
    <img class="opening-handwriting" src="images/handwriting_purple.png" alt="手写文字">
    <img class="opening-elements" src="images/elements_deep.png" alt="装饰元素">
  </div>
  <span class="opening-hint">✦ 点击揭晓 ✦</span>
</div>

<div class="scroll-hint" id="scrollHint">
  <span class="scroll-hint-text">向下滑动 ↓</span>
</div>

<div class="main-container" id="mainContainer">
  <div class="card-wrapper">
    <img class="illustration-bg" id="illustrationBg" src="" alt="背景插画">
    <div class="content-card" id="contentCard">
      <div class="invitation-text">
        <span class="salutation">✦ 诚挚邀请 ✦</span>
        <span class="invite-copy">世界喧嚣，我们向内寻找
微风，繁花，与最亲爱的人
期待您的到来
见证这份简单而纯粹的幸福</span>
      </div>
      <div class="section-divider">
        <div class="div-line"></div>
        <span class="div-ornament">🌸</span>
        <div class="div-line"></div>
      </div>
      <div class="datetime-block">
        <span class="date-main">2026年5月16日</span>
        <span class="date-detail">农历四月初一 · 星期六</span>
        <div class="time-highlight">9:28 仪式开始</div>
      </div>
      <div class="venue-block">
        <span class="venue-label">✦ 婚礼场地 ✦</span>
        <span class="venue-address">宁波市永茂东路1314号</span>
        <span class="venue-name">宁波植物园 · 月季园</span>

<script>
const VENUE_ADDRESS = '浙江省宁波市镇海区永茂东路1314号 宁波植物园·月季园（近三号门）';
const WEDDING_DATE = new Date('2026-05-16T09:28:00+08:00');
const BACKGROUND_URL = 'images/background_web.jpg';
const MUSIC_URL = 'images/Mago Blanco-Until I Found You (Wedding Piano Version).mp3';

let isRevealed = false;
let isCardVisible = false;
let isCardHiding = false;
let isMusicPlaying = false;
let petalRunning = false;

const $overlay       = document.getElementById('openingOverlay');
const $illustration  = document.getElementById('illustrationBg');
const $scrollHint    = document.getElementById('scrollHint');
const $contentCard   = document.getElementById('contentCard');
const $mainContainer = document.getElementById('mainContainer');
const $backWrap      = document.getElementById('backWrap');
const $backBtn       = document.getElementById('backBtn');
const $musicBtn      = document.getElementById('musicBtn');
const $mapBtn        = document.getElementById('mapBtn');
const $toast         = document.getElementById('toast');

const $cdDays  = document.getElementById('cdDays');
const $cdHours = document.getElementById('cdHours');
const $cdMins  = document.getElementById('cdMins');
const $cdSecs  = document.getElementById('cdSecs');

// 相册弹窗元素
const $galleryLink       = document.getElementById('galleryLink');
const $galleryOverlay    = document.getElementById('galleryOverlay');
const $galleryModal      = document.getElementById('galleryModal');
const $galleryModalClose = document.getElementById('galleryModalClose');
const $galleryModalGrid  = document.getElementById('galleryModalGrid');
const $galleryLightbox   = document.getElementById('galleryLightbox');
const $galleryLightboxImg = document.getElementById('galleryLightboxImg');
const $galleryLightboxVideo = document.getElementById('galleryLightboxVideo');
const $galleryLightboxVideoIcon = document.getElementById('galleryLightboxVideoIcon');
const $galleryLightboxClose = document.getElementById('galleryLightboxClose');
const $galleryLightboxPrev = document.getElementById('galleryLightboxPrev');
const $galleryLightboxNext = document.getElementById('galleryLightboxNext');
const $galleryLightboxCounter = document.getElementById('galleryLightboxCounter');

let galleryCurrentIndex = 0;
let galleryItems = [];

function openGalleryModal() {
  $galleryOverlay.classList.add('open');
  $galleryModal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeGalleryModal() {
  $galleryOverlay.classList.remove('open');
  $galleryModal.classList.remove('open');
  document.body.style.overflow = '';
  closeGalleryLightbox();
}

function openGalleryLightbox(index) {
  galleryCurrentIndex = index;
  updateGalleryLightbox();
  $galleryLightbox.classList.add('open');
}

function closeGalleryLightbox() {
  $galleryLightbox.classList.remove('open');
  $galleryLightboxImg.classList.remove('loaded');
  $galleryLightboxVideo.pause();
  $galleryLightboxVideo.src = '';
  $galleryLightboxVideo.style.display = 'none';
  $galleryLightboxVideoIcon.style.display = 'none';
  $galleryLightboxImg.style.display = '';
}

function updateGalleryLightbox() {
  $galleryLightboxImg.classList.remove('loaded');
  $galleryLightboxVideo.pause();
  $galleryLightboxVideo.src = '';
  $galleryLightboxVideo.style.display = 'none';
  $galleryLightboxVideoIcon.style.display = 'none';
  $galleryLightboxImg.style.display = '';
  $galleryLightboxImg.src = galleryItems[galleryCurrentIndex].src;
  $galleryLightboxImg.onload = () => $galleryLightboxImg.classList.add('loaded');
  $galleryLightboxCounter.textContent = (galleryCurrentIndex + 1) + ' / ' + galleryItems.length;
  $galleryLightboxPrev.style.opacity = galleryCurrentIndex === 0 ? '0.3' : '1';
  $galleryLightboxNext.style.opacity = galleryCurrentIndex === galleryItems.length - 1 ? '0.3' : '1';
}

function initGallery() {
  // 只收集图片项
  galleryItems = Array.from($galleryModalGrid.querySelectorAll('.gallery-modal-item:not([data-type="video"]) img'));
}

// 相册弹窗事件绑定（等待 DOM 加载完成后执行）
function bindGalleryEvents() {
  $galleryLink.addEventListener('click', (e) => {
    e.preventDefault();
    initGallery();
    openGalleryModal();
  });

  $galleryModalClose.addEventListener('click', closeGalleryModal);
  $galleryOverlay.addEventListener('click', closeGalleryModal);

  $galleryModalGrid.addEventListener('click', (e) => {
    const item = e.target.closest('.gallery-modal-item');
    if (!item) return;

    if (item.dataset.type === 'video') {
      const videoUrl = item.dataset.video;
      galleryCurrentIndex = -1;
      $galleryLightbox.classList.add('open');
      $galleryLightboxImg.style.display = 'none';
      $galleryLightboxVideo.style.display = 'block';
      $galleryLightboxVideoIcon.style.display = 'flex';
      $galleryLightboxVideo.src = videoUrl;
      $galleryLightboxVideo.load();
      $galleryLightboxVideo.play().catch(() => {
        $galleryLightboxVideoIcon.style.display = 'flex';
      });
      $galleryLightboxCounter.textContent = '🎬 视频';
      $galleryLightboxPrev.style.opacity = '0.3';
      $galleryLightboxNext.style.opacity = '0.3';
      return;
    }

    const imgEl = item.querySelector('img');
    if (imgEl) {
      const idx = galleryItems.indexOf(imgEl);
      if (idx !== -1) openGalleryLightbox(idx);
    }
  });

  $galleryLightboxClose.addEventListener('click', closeGalleryLightbox);
  $galleryLightbox.addEventListener('click', (e) => {
    if (e.target === $galleryLightbox) closeGalleryLightbox();
  });

  $galleryLightboxPrev.addEventListener('click', (e) => {
    e.stopPropagation();
    if (galleryCurrentIndex > 0) { galleryCurrentIndex--; updateGalleryLightbox(); }
  });

  $galleryLightboxNext.addEventListener('click', (e) => {
    e.stopPropagation();
    if (galleryCurrentIndex < galleryItems.length - 1) { galleryCurrentIndex++; updateGalleryLightbox(); }
  });

  document.addEventListener('keydown', (e) => {
    if (!$galleryLightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeGalleryLightbox();
    if (galleryCurrentIndex < 0) return;
    if (e.key === 'ArrowLeft' && galleryCurrentIndex > 0) { galleryCurrentIndex--; updateGalleryLightbox(); }
    if (e.key === 'ArrowRight' && galleryCurrentIndex < galleryItems.length - 1) { galleryCurrentIndex++; updateGalleryLightbox(); }
  });
}

const audioFrame = document.getElementById('audioFrame');
let iframeReady = false;

window.addEventListener('DOMContentLoaded', () => {
  // 初始化持久音频播放器
  audioFrame.addEventListener('load', () => { iframeReady = true; });
  // 监听 iframe 返回的播放状态
  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    if (e.data.type === 'ready') { iframeReady = true; }
    if (e.data.type === 'stateUpdate') {
      isMusicPlaying = e.data.playing;
      if (e.data.playing) {
        $musicBtn.classList.add('playing');
      } else {
        $musicBtn.classList.remove('playing');
      }
    }
  });
  // 如果上次播放过，让 iframe 自动恢复播放状态
  if (localStorage.getItem('weddingMusicPlaying') === 'true') {
    audioFrame.addEventListener('load', () => {
      iframeReady = true;
      // iframe 加载完成后，发送 play 让它从保存的位置继续
      setTimeout(() => { audioFrame.contentWindow.postMessage({ type: 'play' }, '*'); }, 200);
    }, { once: true });
  } else {
    // 如果上次没有在播放，也通知 iframe 已就绪
    audioFrame.addEventListener('load', () => {
      iframeReady = true;
    }, { once: true });
  }
  // 清除 sessionStorage，确保每次访问都正常显示揭晓页（而不是从相册返回后的状态）
  sessionStorage.removeItem('weddingRevealed');
  // 正常绑定揭晓事件
  $overlay.addEventListener('click', onReveal);
  preloadImage(BACKGROUND_URL, () => { $illustration.src = BACKGROUND_URL; });
  updateCountdown();
  setInterval(updateCountdown, 1000);
  $backBtn.addEventListener('click', backToOpening);
  $musicBtn.addEventListener('click', toggleMusic);
  $mapBtn.addEventListener('click', openMap);
  window.addEventListener('scroll', onPageScroll);
  initPetals();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  // 绑定相册弹窗事件
  bindGalleryEvents();
});

function preloadImage(src, onLoad) {
  const img = new Image();
  img.onload = () => { onLoad && onLoad(); };
  img.onerror = () => { onLoad && onLoad(); }; // 降级：仍显示图片
  img.src = src;
}

function onPageScroll() {
  const scrollY = window.scrollY || window.pageYOffset;
  
  // 滚动提示
  if (scrollY > 50) {
    $scrollHint.classList.remove('show');
  } else {
    if (isRevealed) {
      $scrollHint.classList.add('show');
    }
  }
  
  // 卡片显示/隐藏
  if (isRevealed && !isCardHiding) {
    if (scrollY > 100) {
      if (!isCardVisible) {
        isCardVisible = true;
        $contentCard.classList.add('visible');
      }
      $backWrap.classList.add('visible');
    } else {
      if (isCardVisible) {
        isCardVisible = false;
        $contentCard.classList.remove('visible');
        $backWrap.classList.remove('visible');
      }
    }
  }
}

function onReveal() {
  isRevealed = true;
  $illustration.classList.add('revealed');
  $overlay.style.display = 'none';
  $mainContainer.classList.add('scrolling');
  setTimeout(() => { $scrollHint.classList.add('show'); }, 1400);

  // 插画背景出现时播放背景音乐
  playMusic();

  // 滚动到顶部
  window.scrollTo({ top: 0, behavior: 'smooth' });

  if (!petalRunning) {
    petalRunning = true;
    setTimeout(() => { drawPetals(); }, 300);
  }
}

function toggleMusic() {
  if (isMusicPlaying) { pauseMusic(); } else { playMusic(); }
}

function playMusic() {
  // 检查音频是否已初始化（localStorage 中有状态说明已初始化过）
  const audioState = localStorage.getItem('weddingAudioState');
  if (!audioState) {
    // 首次播放，需要初始化音频
    audioFrame.contentWindow.postMessage({ type: 'init', src: MUSIC_URL, title: 'Until I Found You' }, '*');
    // 初始化后等待 ready 事件再播放
    const handleReady = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === 'ready') {
        window.removeEventListener('message', handleReady);
        setTimeout(() => {
          audioFrame.contentWindow.postMessage({ type: 'play' }, '*');
        }, 100);
      }
    };
    window.addEventListener('message', handleReady);
  } else {
    // 已有音频状态，直接继续播放（会从保存的位置继续）
    audioFrame.contentWindow.postMessage({ type: 'play' }, '*');
  }
  isMusicPlaying = true;
  $musicBtn.classList.add('playing');
  localStorage.setItem('weddingMusicPlaying', 'true');
}

function pauseMusic() {
  audioFrame.contentWindow.postMessage({ type: 'pause' }, '*');
  isMusicPlaying = false;
  $musicBtn.classList.remove('playing');
  localStorage.setItem('weddingMusicPlaying', 'false');
}

function openMap() {
  // 高德地图 - 宁波植物园3号门
  const amapUrl = 'https://uri.amap.com/search?keyword=宁波植物园3号门&addr=宁波市镇海区永茂东路1314号&src=mypage&callnative=1';
  window.open(amapUrl, '_blank');
}

function backToOpening() {
  isCardHiding = true;
  isRevealed = false;
  isCardVisible = false;
  $contentCard.classList.remove('visible');
  $backWrap.classList.remove('visible');
  $illustration.classList.remove('revealed');
  $mainContainer.classList.remove('scrolling');
  // 关闭相册弹窗（如果打开着）
  closeGalleryModal();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => {
    isCardHiding = false;
    $overlay.style.display = 'flex';
    // 重置叠加层动画
    const textGroup = $overlay.querySelector('.opening-text-group');
    const hint = $overlay.querySelector('.opening-hint');
    textGroup.style.animation = 'none';
    hint.style.animation = 'none';
    void textGroup.offsetWidth;
    textGroup.style.animation = '';
    hint.style.animation = '';
  }, 600);
}

function updateCountdown() {
  const now = new Date();
  const diff = WEDDING_DATE - now;
  if (diff <= 0) {
    $cdDays.textContent = '00';
    $cdHours.textContent = '00';
    $cdMins.textContent = '00';
    $cdSecs.textContent = '00';
    return;
  }
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const mins = Math.floor((diff / (1000 * 60)) % 60);
  const secs = Math.floor((diff / 1000) % 60);
  $cdDays.textContent = String(days).padStart(2, '0');
  $cdHours.textContent = String(hours).padStart(2, '0');
  $cdMins.textContent = String(mins).padStart(2, '0');
  $cdSecs.textContent = String(secs).padStart(2, '0');
}

let petals = [];
let ctx = null;
let canvasWidth = 0;
let canvasHeight = 0;

function resizeCanvas() {
  const canvas = document.getElementById('petalCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvasWidth = window.innerWidth;
  canvasHeight = window.innerHeight;
  if (!ctx) { ctx = canvas.getContext('2d'); }
}

function initPetals() {
  petals = [];
  for (let i = 0; i < 30; i++) {
    petals.push({
      x: Math.random() * window.innerWidth,
      y: -Math.random() * 400,
      size: Math.random() * 6 + 9,
      speed: Math.random() * 1.0 + 0.2,
      wind: Math.random() * 1.4 - 0.7,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.06,
      alpha: 0,
      maxAlpha: Math.random() * 0.4 + 0.3,
      alphaSpeed: 0.003 + Math.random() * 0.005,
      sway: Math.random() * Math.PI * 2,
      swaySpeed: Math.random() * 0.03 + 0.016,
      type: Math.floor(Math.random() * 2),
      color: Math.random() > 0.5 ? 0 : 1
    });
  }
}

function drawPetals() {
  if (!ctx) {
    const canvas = document.getElementById('petalCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
  }
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);
  petals.forEach(p => {
    if (p.alpha < p.maxAlpha) {
      p.alpha += p.alphaSpeed;
      if (p.alpha > p.maxAlpha) p.alpha = p.maxAlpha;
    }
    p.sway += p.swaySpeed;
    p.x += p.wind + Math.sin(p.sway) * 0.6;
    p.y += p.speed;
    p.rot += p.rotSpeed;
    if (p.y > canvasHeight - 30) {
      p.y = -20 - Math.random() * 200;
      p.x = Math.random() * canvasWidth;
      p.alpha = 0;
    }
    if (p.x < -40) p.x = canvasWidth + 40;
    if (p.x > canvasWidth + 40) p.x = -40;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    const s = p.size;
    if (p.type === 0) {
      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
      gradient.addColorStop(0, p.color === 0 ? 'rgba(255,220,230,0.9)' : 'rgba(220,160,180,0.85)');
      gradient.addColorStop(0.6, p.color === 0 ? 'rgba(255,240,245,0.85)' : 'rgba(196,139,159,0.75)');
      gradient.addColorStop(1, 'rgba(255,255,255,0.3)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.8);
      ctx.bezierCurveTo(s * 0.3, s * 0.5, s * 0.6, s * 0.1, 0, -s * 0.6);
      ctx.bezierCurveTo(-s * 0.6, s * 0.1, -s * 0.3, s * 0.5, 0, s * 0.8);
      ctx.fill();
    } else {
      const leafGrad = ctx.createLinearGradient(0, -s * 0.7, 0, s * 0.7);
      leafGrad.addColorStop(0, 'rgba(120,160,110,0.6)');
      leafGrad.addColorStop(0.5, 'rgba(100,140,90,0.5)');
      leafGrad.addColorStop(1, 'rgba(80,120,70,0.4)');
      ctx.fillStyle = leafGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.7);
      ctx.bezierCurveTo(s * 0.4, -s * 0.3, s * 0.35, s * 0.4, 0, s * 0.7);
      ctx.bezierCurveTo(-s * 0.35, s * 0.4, -s * 0.4, -s * 0.3, 0, -s * 0.7);
      ctx.fill();
      ctx.strokeStyle = 'rgba(70,100,60,0.3)';
      ctx.lineWidth = s * 0.06;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.5);
      ctx.lineTo(0, s * 0.5);
      ctx.stroke();
    }
    ctx.restore();
  });
  requestAnimationFrame(drawPetals);
}

function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 2000);
}
</script>
