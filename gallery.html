<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>我们的相册 · 楼丹宁 & 陈抒钊</title>
<style>
:root {
  --sage: #7a9e7e;
  --sage-light: #a8c5ab;
  --sage-dark: #5a7a5e;
  --lavender: #9b8fb8;
  --lavender-light: #c4b8d9;
  --lavender-dark: #7a6a98;
  --rose: #c48b9f;
  --rose-light: #e8b8c4;
  --text: #4a4a4a;
  --text-light: #7a7a7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: #faf8f5;
  min-height: 100vh;
  -webkit-overflow-smoothing: antialiased;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* 花瓣画布 */
.petal-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 9999;
}

/* 顶部返回栏 */
.gallery-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: max(16px, env(safe-area-inset-top, 16px)) max(20px, env(safe-area-inset-right, 20px)) 12px;
  display: flex;
  align-items: center;
  background: linear-gradient(to bottom, rgba(250,248,245,0.95) 60%, transparent);
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  color: var(--lavender-dark);
  letter-spacing: 1px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  background: none;
  border: none;
  font-family: inherit;
}

.back-icon {
  font-size: 18px;
}

/* 页面标题 */
.gallery-title-wrap {
  text-align: center;
  padding: max(80px, calc(env(safe-area-inset-top, 16px) + 60px)) 20px 24px;
}

.gallery-pretitle {
  display: block;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--lavender);
  margin-bottom: 10px;
}

.gallery-title {
  display: block;
  font-size: clamp(22px, 6vw, 28px);
  color: var(--sage-dark);
  letter-spacing: 4px;
  font-weight: 300;
}

.gallery-subtitle {
  display: block;
  font-size: 12px;
  color: var(--text-light);
  letter-spacing: 2px;
  margin-top: 8px;
}

/* 图片网格 */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  padding: 0 12px 40px;
  max-width: 480px;
  margin: 0 auto;
}

.gallery-item {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 8px;
  cursor: pointer;
  background: rgba(200,190,210,0.2);
}

.gallery-item img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.gallery-item:active img {
  transform: scale(0.96);
}

/* 全屏弹窗 */
.lightbox {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.92);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.lightbox.open {
  opacity: 1;
  pointer-events: auto;
}

.lightbox-img-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.lightbox-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.lightbox-img.loaded {
  opacity: 1;
}

.lightbox-close {
  position: fixed;
  top: max(16px, env(safe-area-inset-top, 16px));
  right: max(20px, env(safe-area-inset-right, 20px));
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100001;
  -webkit-tap-highlight-color: transparent;
}

.lightbox-prev,
.lightbox-next {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100001;
  -webkit-tap-highlight-color: transparent;
}

.lightbox-prev { left: max(12px, env(safe-area-inset-left, 12px)); }
.lightbox-next { right: max(12px, env(safe-area-inset-right, 12px)); }

.lightbox-counter {
  position: fixed;
  bottom: max(30px, env(safe-area-inset-bottom, 30px));
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 12px;
  letter-spacing: 2px;
  z-index: 100001;
}

/* Toast */
.toast {
  position: fixed;
  bottom: max(80px, env(safe-area-inset-bottom, 80px));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(90,122,94,0.92);
  color: white;
  padding: 12px 24px;
  border-radius: 26px;
  font-size: 13px;
  z-index: 999999;
  opacity: 0;
  transition: all 0.4s ease;
  pointer-events: none;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* 音乐按钮 */
.music-btn {
  position: fixed;
  top: max(16px, env(safe-area-inset-top, 16px));
  right: max(20px, env(safe-area-inset-right, 20px));
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: none;
  outline: none;
  font-family: inherit;
}

.music-icon-text { font-size: 20px; color: var(--sage-dark); }

.music-bars {
  display: none;
  align-items: flex-end;
  justify-content: center;
  gap: 2px;
  height: 16px;
}

.music-bars div {
  width: 3px;
  background: var(--sage-dark);
  border-radius: 2px;
  animation: musicBar 0.8s ease-in-out infinite;
}

.music-bars div:nth-child(1) { height: 40%; animation-delay: 0s; }
.music-bars div:nth-child(2) { height: 70%; animation-delay: 0.2s; }
.music-bars div:nth-child(3) { height: 50%; animation-delay: 0.4s; }
.music-bars div:nth-child(4) { height: 80%; animation-delay: 0.6s; }

.music-btn.playing .music-icon-text { display: none; }
.music-btn.playing .music-bars { display: flex; }

@keyframes musicBar {
  0%, 100% { transform: scaleY(1); }
  50%      { transform: scaleY(0.5); }
}
</style>
</head>
<body>

<canvas class="petal-canvas" id="petalCanvas"></canvas>

<!-- 返回按钮 -->
<div class="gallery-header">
  <button class="back-btn" id="backBtn">
    <span class="back-icon">←</span>
    <span>返回邀请</span>
  </button>
</div>

<!-- 音乐按钮 -->
<button class="music-btn" id="musicBtn">
  <div class="music-bars">
    <div></div><div></div><div></div><div></div>
  </div>
  <span class="music-icon-text">♪</span>
</button>

<!-- 页面标题 -->
<div class="gallery-title-wrap">
  <span class="gallery-pretitle">✦ 定格时光 ✦</span>
  <span class="gallery-title">我们的相册</span>
  <span class="gallery-subtitle">记录每一个温暖的瞬间</span>
</div>

<!-- 图片网格 -->
<!-- TODO: 替换下方占位图为你自己的照片 -->
<div class="gallery-grid" id="galleryGrid">
  <div class="gallery-item"><img src="images/photo1.jpg" alt="照片1" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo2.jpg" alt="照片2" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo3.jpg" alt="照片3" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo4.jpg" alt="照片4" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo5.jpg" alt="照片5" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo6.jpg" alt="照片6" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo7.jpg" alt="照片7" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo8.jpg" alt="照片8" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo9.jpg" alt="照片9" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo10.jpg" alt="照片10" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo11.jpg" alt="照片11" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo12.jpg" alt="照片12" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo13.jpg" alt="照片13" loading="lazy"></div>
  <div class="gallery-item"><img src="images/photo14.jpg" alt="照片14" loading="lazy"></div>
</div>

<!-- 全屏弹窗 -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <button class="lightbox-prev" id="lightboxPrev">‹</button>
  <div class="lightbox-img-wrap">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <button class="lightbox-next" id="lightboxNext">›</button>
  <div class="lightbox-counter" id="lightboxCounter"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// -------- 花瓣效果（复用主页面逻辑） --------
let petals = [];
let ctx = null;
let canvasWidth = 0;
let canvasHeight = 0;

function resizeCanvas() {
  const canvas = document.getElementById('petalCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvasWidth = window.innerWidth;
  canvasHeight = window.innerHeight;
  if (!ctx) { ctx = canvas.getContext('2d'); }
}

function initPetals() {
  petals = [];
  for (let i = 0; i < 20; i++) {
    petals.push({
      x: Math.random() * window.innerWidth,
      y: -Math.random() * 400,
      size: Math.random() * 6 + 9,
      speed: Math.random() * 0.8 + 0.2,
      wind: Math.random() * 1.4 - 0.7,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.06,
      alpha: 0,
      maxAlpha: Math.random() * 0.4 + 0.3,
      alphaSpeed: 0.003 + Math.random() * 0.005,
      sway: Math.random() * Math.PI * 2,
      swaySpeed: Math.random() * 0.03 + 0.016,
      type: Math.floor(Math.random() * 2),
      color: Math.random() > 0.5 ? 0 : 1
    });
  }
}

function drawPetals() {
  if (!ctx) {
    const canvas = document.getElementById('petalCanvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
  }
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);
  petals.forEach(p => {
    if (p.alpha < p.maxAlpha) {
      p.alpha += p.alphaSpeed;
      if (p.alpha > p.maxAlpha) p.alpha = p.maxAlpha;
    }
    p.sway += p.swaySpeed;
    p.x += p.wind + Math.sin(p.sway) * 0.6;
    p.y += p.speed;
    p.rot += p.rotSpeed;
    if (p.y > canvasHeight - 30) {
      p.y = -20 - Math.random() * 200;
      p.x = Math.random() * canvasWidth;
      p.alpha = 0;
    }
    if (p.x < -40) p.x = canvasWidth + 40;
    if (p.x > canvasWidth + 40) p.x = -40;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    const s = p.size;
    if (p.type === 0) {
      const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, s);
      gradient.addColorStop(0, p.color === 0 ? 'rgba(255,220,230,0.9)' : 'rgba(220,160,180,0.85)');
      gradient.addColorStop(0.6, p.color === 0 ? 'rgba(255,240,245,0.85)' : 'rgba(196,139,159,0.75)');
      gradient.addColorStop(1, 'rgba(255,255,255,0.3)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(0, s * 0.8);
      ctx.bezierCurveTo(s * 0.3, s * 0.5, s * 0.6, s * 0.1, 0, -s * 0.6);
      ctx.bezierCurveTo(-s * 0.6, s * 0.1, -s * 0.3, s * 0.5, 0, s * 0.8);
      ctx.fill();
    } else {
      const leafGrad = ctx.createLinearGradient(0, -s * 0.7, 0, s * 0.7);
      leafGrad.addColorStop(0, 'rgba(120,160,110,0.6)');
      leafGrad.addColorStop(0.5, 'rgba(100,140,90,0.5)');
      leafGrad.addColorStop(1, 'rgba(80,120,70,0.4)');
      ctx.fillStyle = leafGrad;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.7);
      ctx.bezierCurveTo(s * 0.4, -s * 0.3, s * 0.35, s * 0.4, 0, s * 0.7);
      ctx.bezierCurveTo(-s * 0.35, s * 0.4, -s * 0.4, -s * 0.3, 0, -s * 0.7);
      ctx.fill();
      ctx.strokeStyle = 'rgba(70,100,60,0.3)';
      ctx.lineWidth = s * 0.06;
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.5);
      ctx.lineTo(0, s * 0.5);
      ctx.stroke();
    }
    ctx.restore();
  });
  requestAnimationFrame(drawPetals);
}

// -------- 相册弹窗逻辑 --------
const $grid = document.getElementById('galleryGrid');
const $lightbox = document.getElementById('lightbox');
const $lightboxImg = document.getElementById('lightboxImg');
const $lightboxCounter = document.getElementById('lightboxCounter');
const $lightboxClose = document.getElementById('lightboxClose');
const $lightboxPrev = document.getElementById('lightboxPrev');
const $lightboxNext = document.getElementById('lightboxNext');
const $toast = document.getElementById('toast');

let currentIndex = 0;
const items = Array.from($grid.querySelectorAll('.gallery-item img'));

function openLightbox(index) {
  currentIndex = index;
  updateLightbox();
  $lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  $lightbox.classList.remove('open');
  document.body.style.overflow = '';
  $lightboxImg.classList.remove('loaded');
}

function updateLightbox() {
  $lightboxImg.classList.remove('loaded');
  $lightboxImg.src = items[currentIndex].src;
  $lightboxImg.onload = () => $lightboxImg.classList.add('loaded');
  $lightboxCounter.textContent = (currentIndex + 1) + ' / ' + items.length;
  $lightboxPrev.style.opacity = currentIndex === 0 ? '0.3' : '1';
  $lightboxNext.style.opacity = currentIndex === items.length - 1 ? '0.3' : '1';
}

$grid.addEventListener('click', (e) => {
  const item = e.target.closest('.gallery-item');
  if (item) {
    const idx = items.indexOf(item.querySelector('img'));
    if (idx !== -1) openLightbox(idx);
  }
});

$lightboxClose.addEventListener('click', closeLightbox);
$lightbox.addEventListener('click', (e) => {
  if (e.target === $lightbox) closeLightbox();
});

$lightboxPrev.addEventListener('click', (e) => {
  e.stopPropagation();
  if (currentIndex > 0) { currentIndex--; updateLightbox(); }
});

$lightboxNext.addEventListener('click', (e) => {
  e.stopPropagation();
  if (currentIndex < items.length - 1) { currentIndex++; updateLightbox(); }
});

document.addEventListener('keydown', (e) => {
  if (!$lightbox.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateLightbox(); }
  if (e.key === 'ArrowRight' && currentIndex < items.length - 1) { currentIndex++; updateLightbox(); }
});

document.getElementById('backBtn').addEventListener('click', () => {
  window.location.href = 'index.html';
});

function showToast(msg) {
  $toast.textContent = msg;
  $toast.classList.add('show');
  setTimeout(() => $toast.classList.remove('show'), 2000);
}

// -------- 启动 --------
window.addEventListener('DOMContentLoaded', () => {
  resizeCanvas();
  initPetals();
  drawPetals();
  window.addEventListener('resize', resizeCanvas);

  // 检查是否需要续播音乐
  const shouldPlayMusic = localStorage.getItem('weddingMusicPlaying') === 'true';
  if (shouldPlayMusic) {
    playGalleryMusic();
  }
});

// -------- 背景音乐 --------
const MUSIC_URL = 'images/Mago Blanco-Until I Found You (Wedding Piano Version).mp3';
const galleryAudio = new Audio();
galleryAudio.loop = true;
let isGalleryMusicPlaying = false;

const $musicBtn = document.getElementById('musicBtn');

function playGalleryMusic() {
  if (!galleryAudio.src || galleryAudio.src.endsWith(window.location.pathname)) {
    galleryAudio.src = MUSIC_URL;
    galleryAudio.title = 'Until I Found You';
  }
  galleryAudio.play().then(() => {
    isGalleryMusicPlaying = true;
    $musicBtn.classList.add('playing');
  }).catch(() => {
    isGalleryMusicPlaying = false;
    $musicBtn.classList.remove('playing');
  });
}

function pauseGalleryMusic() {
  galleryAudio.pause();
  isGalleryMusicPlaying = false;
  $musicBtn.classList.remove('playing');
  localStorage.setItem('weddingMusicPlaying', 'false');
}

$musicBtn.addEventListener('click', () => {
  if (isGalleryMusicPlaying) {
    pauseGalleryMusic();
  } else {
    playGalleryMusic();
  }
});
</script>
</body>
</html>
