<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:transparent;">
<audio id="bgm" loop preload="auto"></audio>
<script>
  const STORAGE_KEY = 'weddingAudioState';
  const audio = document.getElementById('bgm');
  let pendingPlay = false;
  let pendingTime = null;

  // 恢复之前的播放状态
  function restoreState() {
    try {
      const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (state.src) {
        audio.src = state.src;
        audio.title = state.title || '';
        pendingTime = state.currentTime;
        pendingPlay = !state.paused;
        audio.load();
      }
    } catch (e) {}
  }

  // 保存当前播放状态
  function saveState() {
    try {
      const state = {
        src: audio.src,
        title: audio.title,
        currentTime: audio.currentTime,
        paused: audio.paused
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {}
  }

  // 定期保存播放位置（每2秒）
  setInterval(() => {
    if (!audio.paused && audio.src) {
      saveState();
    }
  }, 2000);

  // 保存状态在各种事件发生时
  audio.addEventListener('play', saveState);
  audio.addEventListener('pause', saveState);
  audio.addEventListener('ended', saveState);

  // 音频准备好后恢复位置并播放
  audio.addEventListener('canplay', () => {
    window.parent.postMessage({ type: 'ready' }, '*');
    if (pendingTime !== null) {
      audio.currentTime = pendingTime;
      pendingTime = null;
    }
    if (pendingPlay) {
      pendingPlay = false;
      audio.play().catch(() => {});
    }
  });

  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    switch (e.data.type) {
      case 'init':
        audio.title = e.data.title || '';
        audio.src = e.data.src;
        audio.load();
        break;
      case 'play':
        pendingPlay = true;
        if (audio.paused) {
          audio.play().catch(() => {});
        }
        saveState();
        break;
      case 'pause':
        pendingPlay = false;
        audio.pause();
        saveState();
        break;
      case 'toggle':
        if (audio.paused) {
          pendingPlay = true;
          audio.play().catch(() => {});
        } else {
          pendingPlay = false;
          audio.pause();
        }
        saveState();
        break;
    }
  });

  // 通知父页面当前播放状态
  function notifyState() {
    window.parent.postMessage({ type: 'stateUpdate', playing: !audio.paused }, '*');
  }

  audio.addEventListener('playing', notifyState);
  audio.addEventListener('pause', notifyState);

  // 页面加载时恢复之前的播放状态
  restoreState();
</script>
</body>
</html>
