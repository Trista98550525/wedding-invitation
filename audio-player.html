<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="margin:0;padding:0;background:transparent;">
<audio id="bgm" loop preload="auto"></audio>
<script>
  const audio = document.getElementById('bgm');

  window.addEventListener('message', (e) => {
    if (!e.data || typeof e.data !== 'object') return;
    switch (e.data.type) {
      case 'init':
        audio.src = e.data.src;
        audio.title = e.data.title || '';
        break;
      case 'play':
        if (audio.paused) {
          audio.play().catch(() => {});
        }
        break;
      case 'pause':
        audio.pause();
        break;
      case 'toggle':
        if (audio.paused) {
          audio.play().catch(() => {});
        } else {
          audio.pause();
        }
        break;
    }
  });

  // 通知父页面当前播放状态
  function notifyState() {
    window.parent.postMessage({ type: 'stateUpdate', playing: !audio.paused }, '*');
  }

  audio.addEventListener('playing', notifyState);
  audio.addEventListener('pause', notifyState);

  // 收到 init 后自动播放（如果父页面要求）
  audio.addEventListener('canplay', () => {
    window.parent.postMessage({ type: 'ready' }, '*');
  });
</script>
</body>
</html>
